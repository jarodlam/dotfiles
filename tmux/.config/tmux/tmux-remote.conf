# tmux-remote.conf - Keybindings for remote/ephemeral tmux sessions
# Applied via: <prefix> S (runs source-remote-tmux-config.sh)
# No theming applied.

# Set prefix to C-a
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Set new panes to open in current directory
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Instant esc key
set -g escape-time 0

# Enable mouse mode
set -g mouse on

# Scroll one line at a time
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# Act like vim
setw -g mode-keys vi

# Allow applications inside tmux to copy to tmux's clipboard
set -g set-clipboard on

# Don't auto exit copy mode with mouse
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Scrollback size
set -g history-limit 999999999

# Focus events
set -g focus-events on

# Rename windows to current directory
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Renumber windows when one is killed
set -g renumber-windows on

# Vim detection for smart pane navigation/resizing
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Vim-style pane navigation (vim-tmux-navigator, inlined)
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Vim-style pane resizing (better-vim-tmux-resizer, inlined)
bind-key -n M-h if-shell "$is_vim" "send-keys M-h" "resize-pane -L 10"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j" "resize-pane -D 5"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k" "resize-pane -U 5"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l" "resize-pane -R 10"

bind-key -T copy-mode-vi M-h resize-pane -L 10
bind-key -T copy-mode-vi M-j resize-pane -D 5
bind-key -T copy-mode-vi M-k resize-pane -U 5
bind-key -T copy-mode-vi M-l resize-pane -R 10
